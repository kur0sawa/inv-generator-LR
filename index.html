<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Undangan WA - Tema Sunflower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #fff6d9 100%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fff8e7; 
        }
        ::-webkit-scrollbar-thumb {
            background: #fbbf24; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f59e0b; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2 mb-6 md:mb-8 mt-4 md:mt-0">
            <h1 class="text-2xl md:text-4xl font-extrabold text-amber-600 tracking-tight">
                🌻 Panel Undangan Digital 🌻
            </h1>
            <p class="text-amber-800/70 font-medium text-sm md:text-base">Lina & Rizal</p>
        </div>
        
        <!-- Bagian Atas: Pengaturan & Template -->
        <div class="bg-white/80 backdrop-blur-md p-5 md:p-8 rounded-2xl shadow-xl border border-amber-100 grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="space-y-4">
                <h2 class="text-lg md:text-xl font-bold text-amber-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/>
                        <path d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8zm0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5z"/>
                    </svg>
                    Data Tamu
                </h2>
                
                <div class="border-2 border-dashed border-amber-300 rounded-xl p-5 text-center bg-amber-50/50 hover:bg-amber-100/50 transition duration-300">
                    <label class="block cursor-pointer">
                        <span class="block text-sm font-semibold text-amber-800 mb-2">Upload File CSV Tamu</span>
                        <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="handleFileSelect(event)">
                        <span id="fileNameDisplay" class="inline-block px-4 py-2 bg-white text-amber-600 text-xs font-bold rounded-lg shadow-sm border border-amber-200 hover:shadow-md transition">
                            Pilih File .csv
                        </span>
                    </label>
                    <p class="text-[11px] text-amber-700 mt-3">Format kolom wajib: <strong class="text-amber-900">Nama, Nomor HP</strong></p>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-amber-700">Template Pesan</label>
                <textarea id="messageTemplate" rows="8" 
                    class="w-full px-4 py-3 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-xs shadow-sm bg-white/90 text-gray-700 transition resize-none md:resize-y"></textarea>
            </div>

        </div>

        <!-- Bagian Bawah: Daftar Tamu dari CSV -->
        <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl border border-amber-100 overflow-hidden">
            <div class="p-4 md:p-6 border-b border-amber-100 flex justify-between items-center bg-gradient-to-r from-amber-50 to-white">
                <h3 class="text-base md:text-lg font-bold text-amber-800">Daftar Antrean (<span id="guestCount">0</span>)</h3>
                <div class="text-[10px] md:text-xs font-medium text-amber-600 bg-amber-100 px-3 py-1 rounded-full">Siap Dikirim 🚀</div>
            </div>
            
            <div class="w-full">
                <!-- Tabel akan menjadi Card Layout di layar kecil (Mobile) -->
                <table class="w-full text-left border-collapse">
                    <thead class="hidden md:table-header-group">
                        <tr class="bg-amber-100/50 text-amber-900 text-xs font-bold uppercase tracking-wider">
                            <th class="px-6 py-4 w-12 text-center">No</th>
                            <th class="px-6 py-4">Nama Tamu</th>
                            <th class="px-6 py-4">Nomor WhatsApp</th>
                            <th class="px-6 py-4 w-28 text-center">Status</th>
                            <th class="px-6 py-4 w-32 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="guestTableBody" class="text-sm divide-y divide-amber-100 md:divide-amber-50">
                        <tr>
                            <td colspan="5" class="block md:table-cell px-6 py-12 text-center text-amber-600/60 font-medium italic">
                                Belum ada data. Silakan upload file CSV kamu. 🌻
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let globalGuestList = [];

        window.onload = function() {
            const yellowHeart = String.fromCodePoint(0x1F49B);
            
            const defaultText = `Assalamu'alaikum warahmatullahi wabarakatuh,
Dengan memohon ridha Allah SWT, kami mengundang Bapak/Ibu/Saudara/i

[NAMA]

untuk hadir dalam acara pernikahan kami.

Berikut undangan digitalnya:

https://wittywhale.id/Lina-Rizal/?to=[NAMA_URL]

Jazakallahu khairan atas doa dan kehadirannya ${yellowHeart}
Wassalamu'alaikum warahmatullahi wabarakatuh.`;
            
            document.getElementById('messageTemplate').value = defaultText;
        };

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileNameDisplay').innerText = file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseCSV(text);
            };
            reader.readAsText(file);
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) {
                alert("File CSV kosong atau tidak valid!");
                return;
            }

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const nameIndex = headers.findIndex(h => h.includes('nama'));
            const phoneIndex = headers.findIndex(h => h.includes('nomor') || h.includes('no') || h.includes('phone') || h.includes('hp'));

            if (nameIndex === -1 || phoneIndex === -1) {
                alert("Gagal mendeteksi kolom. Pastikan ada kolom 'Nama' dan 'Nomor HP'!");
                return;
            }

            globalGuestList = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (row.length < Math.max(nameIndex, phoneIndex) + 1) continue;

                let name = row[nameIndex].replace(/^"|"$/g, '').trim();
                let phone = row[phoneIndex].replace(/^"|"$/g, '').trim();

                if (name && phone) {
                    globalGuestList.push({ name, phone, sent: false });
                }
            }

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('guestTableBody');
            const countDisplay = document.getElementById('guestCount');
            
            tbody.innerHTML = '';
            countDisplay.innerText = globalGuestList.length;

            if (globalGuestList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="block md:table-cell px-6 py-12 text-center text-amber-600/60 font-medium italic">Belum ada data. Silakan upload file CSV kamu. 🌻</td></tr>`;
                return;
            }

            globalGuestList.forEach((guest, index) => {
                const tr = document.createElement('tr');
                // Mengubah baris (tr) menjadi block di mobile agar menumpuk ke bawah, dan table-row di desktop
                tr.className = guest.sent 
                    ? "bg-emerald-50/40 block md:table-row p-4 md:p-0" 
                    : "hover:bg-amber-50/50 transition-colors block md:table-row p-4 md:p-0";

                tr.innerHTML = `
                    <td class="flex md:table-cell justify-between items-center px-0 py-1.5 md:px-6 md:py-4 md:text-center font-medium ${guest.sent ? 'text-emerald-400' : 'text-amber-700/50'}">
                        <span class="md:hidden font-bold text-[10px] uppercase text-amber-600/70 tracking-wider">No</span>
                        <span>${index + 1}</span>
                    </td>
                    <td class="flex md:table-cell justify-between items-center px-0 py-1.5 md:px-6 md:py-4 font-semibold ${guest.sent ? 'text-emerald-600/50 line-through' : 'text-gray-800'}">
                        <span class="md:hidden font-bold text-[10px] uppercase text-amber-600/70 tracking-wider">Nama</span>
                        <span>${guest.name}</span>
                    </td>
                    <td class="flex md:table-cell justify-between items-center px-0 py-1.5 md:px-6 md:py-4 font-mono text-xs ${guest.sent ? 'text-emerald-600/50 line-through' : 'text-gray-600'}">
                        <span class="md:hidden font-bold text-[10px] uppercase text-amber-600/70 tracking-wider">WhatsApp</span>
                        <span>${guest.phone}</span>
                    </td>
                    <td class="flex md:table-cell justify-between items-center px-0 py-1.5 md:px-6 md:py-4 md:text-center">
                        <span class="md:hidden font-bold text-[10px] uppercase text-amber-600/70 tracking-wider">Status</span>
                        <span class="px-3 py-1 text-[11px] font-bold rounded-full border ${guest.sent ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200'}">
                            ${guest.sent ? 'Terkirim ✓' : 'Standby'}
                        </span>
                    </td>
                    <td class="block md:table-cell px-0 md:px-6 pt-4 pb-1 md:py-4 mt-2 md:mt-0 border-t border-amber-100 md:border-0 md:text-center">
                        <button onclick="sendIndividual(${index})" 
                            class="w-full md:w-auto px-4 py-3 md:py-2 text-sm md:text-xs font-bold rounded-lg shadow-sm text-white ${guest.sent ? 'bg-emerald-400 hover:bg-emerald-500' : 'bg-amber-500 hover:bg-amber-600'} transition-all transform md:hover:scale-105 flex items-center justify-center mx-auto gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                            </svg>
                            ${guest.sent ? 'Kirim Ulang' : 'Kirim Sekarang'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sendIndividual(index) {
            const guest = globalGuestList[index];
            let template = document.getElementById('messageTemplate').value;
            let phone = guest.phone.replace(/[- ]/g, ''); 

            if (phone.startsWith('0')) {
                phone = '62' + phone.slice(1);
            }

            template = template.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const nameUrlEncoded = encodeURIComponent(guest.name);

            let finalMessage = template
                .replace(/\[NAMA\]/g, guest.name)
                .replace(/\[NAMA_URL\]/g, nameUrlEncoded);

            const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(finalMessage)}`;
            
            globalGuestList[index].sent = true;
            renderTable();

            window.open(waUrl, '_blank');
        }
    </script>
</body>
</html>
