<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Undangan WA - Firebase Realtime Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #fff6d9 100%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #fff8e7; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body class="min-h-screen p-3 md:p-8 text-gray-800 flex items-center justify-center">

    <div class="w-full max-w-4xl mx-auto space-y-6">
        
        <div id="welcomeScreen" class="max-w-md mx-auto text-center bg-white/80 backdrop-blur-md p-6 md:p-8 rounded-3xl shadow-xl border border-amber-100 space-y-6 flex flex-col justify-between">
            <div class="space-y-6">
                <div class="space-y-2">
                    <span class="text-5xl">🌻</span>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-amber-600 tracking-tight">Panel Undangan</h1>
                    <p class="text-amber-800/70 font-medium text-sm">Lina & Rizal</p>
                </div>
                
                <div class="flex flex-col gap-3 pt-2">
                    <button onclick="setMode('manual')" class="w-full p-4 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-2xl shadow-md transition flex items-center justify-center gap-3">
                        ✍ Input Manual Cepat
                    </button>
                    <button onclick="setMode('csv')" class="w-full p-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl shadow-md transition flex items-center justify-center gap-3">
                        📂 Upload File CSV (Massal)
                    </button>
                </div>

                <div id="cloudStatusBadge" class="text-xs bg-amber-50 text-amber-800 p-3 rounded-xl border border-amber-200 font-medium flex items-center justify-center gap-2">
                    ⏳ Menghubungkan ke Firebase Cloud...
                </div>
            </div>

            <div class="text-[11px] text-amber-800/50 font-medium tracking-wide pt-4 border-t border-amber-100/60 italic select-none">
                Made with full of love and a little bit of caffeine ☕
            </div>
        </div>

        <div id="mainWorkspace" class="hidden space-y-4 md:space-y-6">
            
            <div class="flex flex-col sm:flex-row justify-between items-center bg-white/60 backdrop-blur-sm p-4 rounded-2xl border border-amber-100 gap-4">
                <div class="flex items-center gap-2 w-full sm:w-auto justify-between sm:justify-start">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🌻</span>
                        <div>
                            <h2 class="font-bold text-amber-800 text-base md:text-lg">Workspace</h2>
                            <p id="workspaceCloudStatus" class="text-[10px] text-emerald-600 font-bold">Firebase Realtime Connected ⚡</p>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 w-full sm:w-auto justify-end flex-wrap">
                    <button onclick="clearAllData()" class="text-xs font-bold text-red-700 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-xl transition">
                        🗑 Reset Hapus Semua Data
                    </button>
                    <button onclick="resetToWelcome()" class="text-xs font-bold text-amber-700 bg-amber-100 hover:bg-amber-200 px-3 py-2 rounded-xl transition">
                        ↩ Menu Utama
                    </button>
                </div>
            </div>
            
            <div class="bg-white/80 backdrop-blur-md p-4 md:p-8 rounded-2xl shadow-xl border border-amber-100 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <div class="space-y-4">
                    <div id="manualInputFields" class="hidden space-y-4">
                        <h2 class="text-base md:text-lg font-bold text-amber-700">✍ Input Manual</h2>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">Nama Penerima</label>
                            <input type="text" id="manualGuestName" placeholder="Contoh: Budi" class="w-full px-4 py-2 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm bg-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">Nomor WhatsApp</label>
                            <input type="text" id="manualGuestPhone" placeholder="Contoh: 0812345" class="w-full px-4 py-2 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm bg-white">
                        </div>
                        <button onclick="addManualGuest()" class="w-full py-2.5 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl shadow-sm transition text-sm">
                            ＋ Tambahkan ke Firebase cloud
                        </button>
                    </div>
                    
                    <div id="csvInputFields" class="hidden space-y-4">
                        <h2 class="text-base md:text-lg font-bold text-emerald-700">📂 Upload CSV</h2>
                        <div class="border-2 border-dashed border-amber-300 rounded-xl p-4 text-center bg-amber-50/50 hover:bg-amber-100/50 transition duration-300">
                            <label class="block cursor-pointer">
                                <span class="block text-xs font-semibold text-amber-800 mb-2">Pilih dokumen tamu (.csv)</span>
                                <input type="file" id="csvFile" accept=".csv" class="hidden" onchange="handleFileSelect(event)">
                                <span id="fileNameDisplay" class="inline-block px-4 py-2 bg-white text-amber-600 text-xs font-bold rounded-lg shadow-sm border border-amber-200 hover:shadow-md transition">
                                    Browse File
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-amber-700">Template Pesan</label>
                    <textarea id="messageTemplate" rows="12" class="w-full px-4 py-3 border border-amber-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-xs shadow-sm bg-white/90 text-gray-700 transition resize-none"></textarea>
                </div>
            </div>

            <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl border border-amber-100 overflow-hidden">
                <div class="p-4 md:p-6 border-b border-amber-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-gradient-to-r from-amber-50 to-white">
                    <h3 class="text-base md:text-lg font-bold text-amber-800">Daftar Antrean Cloud (<span id="guestCount">0</span>)</h3>
                    <div class="flex gap-2 text-[10px] md:text-xs font-bold">
                        <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full">Standby: <span id="countStandby">0</span></span>
                        <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full">Terkirim ✓: <span id="countSent">0</span></span>
                    </div>
                </div>
                
                <div class="w-full">
                    <table class="w-full text-left border-collapse hidden md:table">
                        <thead>
                            <tr class="bg-amber-100/50 text-amber-900 text-xs font-bold uppercase tracking-wider">
                                <th class="px-6 py-4 w-12 text-center">No</th>
                                <th class="px-6 py-4">Nama Tamu</th>
                                <th class="px-6 py-4">Nomor WhatsApp</th>
                                <th class="px-6 py-4 w-40 text-center">Status</th>
                                <th class="px-6 py-4 w-48 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="guestTableBodyDesktop" class="text-sm divide-y divide-amber-50"></tbody>
                    </table>
                    <div id="guestCardContainerMobile" class="block md:hidden divide-y divide-amber-100 p-2 space-y-3 bg-white/50"></div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Konfigurasi Firebase milik Fahrizal
        const firebaseConfig = {
            apiKey: "AIzaSyDmkYQpLfPj61r_x_x1MpO_DQkrOhK-4VM",
            authDomain: "database-undangan-lr.firebaseapp.com",
            projectId: "database-undangan-lr",
            storageBucket: "database-undangan-lr.firebasestorage.app",
            messagingSenderId: "960718379928",
            appId: "1:960718379928:web:8257e924172eeaeec369ed",
            measurementId: "G-3EGCXNHMT9"
        };

        // Inisialisasi Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const guestsCollectionRef = collection(db, "tamu_undangan");

        let globalGuestList = [];

        window.onload = function() {
            document.getElementById('messageTemplate').value = `Assalamu'alaikum warahmatullahi wabarakatuh,\n\nKepada yang terhomat Bapak/Ibu/Saudara/i/ serta Sahabat kami\n*[NAMA]*\n\nBismillahirrahmanirrahim, tanpa mengurangi rasa hormat dan dengan penuh kerendahan hati kami mengundang kehadiran dan doa restu dalam acara walimah pernikahan kami.\n\nUntuk detail waktu dan lokasi dapat dilihat pada undangan berikut:\nhttps://wittywhale.id/Lina-Rizal/?to=[NAMA_URL]\n\nJazakallahu khairan atas segala doa dan kehadirannya 💛\n\nYang Berbahagia,\n*Lina & Rizal*\n\nWassalamu'alaikum warahmatullahi wabarakatuh.`;

            // Sinkronisasi data real-time
            const q = query(guestsCollectionRef, orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                globalGuestList = [];
                snapshot.forEach((doc) => {
                    let data = doc.data();
                    globalGuestList.push({
                        id: doc.id,
                        name: data.name,
                        phone: data.phone,
                        sent: data.sent
                    });
                });
                
                const statusBadge = document.getElementById('cloudStatusBadge');
                if(statusBadge) {
                    statusBadge.className = "text-xs bg-emerald-50 text-emerald-800 p-3 rounded-xl border border-emerald-200 font-medium flex items-center justify-center gap-2";
                    statusBadge.innerText = "🟢 Firebase Cloud Terhubung Aktif (" + globalGuestList.length + " Tamu)";
                }
                
                renderTable();
            }, (error) => {
                console.error("Firebase Connection Error: ", error);
            });
        };

        window.addManualGuest = async function() {
            const nameField = document.getElementById('manualGuestName');
            const phoneField = document.getElementById('manualGuestPhone');
            const name = nameField.value.trim();
            let phone = phoneField.value.trim();

            if (!name || !phone) { alert('Nama dan Nomor HP wajib diisi!'); return; }
            phone = cleanAndFormatPhone(phone);

            const docId = btoa(encodeURIComponent(name + phone)).replace(/=/g, "");

            try {
                await setDoc(doc(db, "tamu_undangan", docId), {
                    name: name,
                    phone: phone,
                    sent: false,
                    timestamp: new Date().getTime()
                });
                nameField.value = '';
                phoneField.value = '';
            } catch (e) { alert("Gagal menyimpan ke cloud: " + e.message); }
        };

        window.parseCSV = async function(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return;

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const nameIndex = headers.findIndex(h => h.includes('nama'));
            const phoneIndex = headers.findIndex(h => h.includes('nomor') || h.includes('no') || h.includes('phone') || h.includes('hp'));

            const batch = writeBatch(db);
            let addedCount = 0;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (row.length < Math.max(nameIndex, phoneIndex) + 1) continue;

                let name = row[nameIndex].replace(/^"|"$/g, '').trim();
                let rawPhone = row[phoneIndex].replace(/^"|"$/g, '').trim();

                if (name && rawPhone) {
                    let phone = cleanAndFormatPhone(rawPhone);
                    const docId = btoa(encodeURIComponent(name + phone)).replace(/=/g, "");
                    const docRef = doc(db, "tamu_undangan", docId);
                    
                    batch.set(docRef, {
                        name: name,
                        phone: phone,
                        sent: false,
                        timestamp: new Date().getTime() + i
                    });
                    addedCount++;
                }
            }

            try {
                await batch.commit();
                alert("Berhasil menambahkan " + addedCount + " tamu massal ke Firebase Cloud!");
            } catch (e) { alert("Gagal batch upload: " + e.message); }
        };

        window.toggleStatus = async function(index) {
            const guest = globalGuestList[index];
            const newStatus = !guest.sent;

            try {
                await setDoc(doc(db, "tamu_undangan", guest.id), { sent: newStatus }, { merge: true });
            } catch (e) { console.error("Gagal update status: ", e); }
        };

        window.deleteIndividual = async function(index) {
            const guest = globalGuestList[index];
            if(confirm(`Hapus tamu "${guest.name}" dari database cloud?`)) {
                try {
                    await deleteDoc(doc(db, "tamu_undangan", guest.id));
                } catch (e) { console.error("Gagal menghapus dokumen: ", e); }
            }
        };

        window.clearAllData = async function() {
            if(confirm("PERINGATAN! Ini akan menghapus BERSIH seluruh database tamu di Firebase Cloud secara permanen. Lanjutkan?")) {
                const batch = writeBatch(db);
                globalGuestList.forEach((guest) => {
                    batch.delete(doc(db, "tamu_undangan", guest.id));
                });
                try {
                    await batch.commit();
                    resetToWelcome();
                } catch (e) { alert("Gagal reset data: " + e.message); }
            }
        };

        window.sendIndividual = function(index) {
            const guest = globalGuestList[index];
            let template = document.getElementById('messageTemplate').value;
            const nameUrlEncoded = encodeURIComponent(guest.name);

            let finalMessage = template.replace(/\[NAMA\]/g, guest.name).replace(/\[NAMA_URL\]/g, nameUrlEncoded);
            const waUrl = `https://wa.me/${guest.phone}?text=${encodeURIComponent(finalMessage)}`;
            
            setDoc(doc(db, "tamu_undangan", guest.id), { sent: true }, { merge: true });

            window.open(waUrl, '_blank');
        };

        window.setMode = function(mode) {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('mainWorkspace').classList.remove('hidden');
            document.body.classList.remove('flex', 'items-center', 'justify-center');

            if(mode === 'manual') {
                document.getElementById('manualInputFields').classList.remove('hidden');
                document.getElementById('csvInputFields').classList.add('hidden');
            } else if(mode === 'csv') {
                document.getElementById('csvInputFields').classList.remove('hidden');
                document.getElementById('manualInputFields').classList.add('hidden');
            }
            renderTable();
        };

        window.resetToWelcome = function() {
            document.getElementById('fileNameDisplay').innerText = "Pilih File .csv";
            document.getElementById('mainWorkspace').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.body.classList.add('flex', 'items-center', 'justify-center');
        };

        function cleanAndFormatPhone(phone) {
            let cleaned = phone.toString().replace(/[^0-9]/g, ''); 
            if (cleaned.startsWith('0')) { cleaned = '62' + cleaned.slice(1); }
            return cleaned;
        }

        window.handleFileSelect = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name;

            const reader = new FileReader();
            reader.onload = function(e) { parseCSV(e.target.result); };
            reader.readAsText(file);
            event.target.value = '';
        };

        function renderTable() {
            const tbodyDesktop = document.getElementById('guestTableBodyDesktop');
            const containerMobile = document.getElementById('guestCardContainerMobile');
            const countDisplay = document.getElementById('guestCount');
            const countStandby = document.getElementById('countStandby');
            const countSent = document.getElementById('countSent');
            
            tbodyDesktop.innerHTML = '';
            containerMobile.innerHTML = '';
            countDisplay.innerText = globalGuestList.length;

            let standby = 0; let sent = 0;

            if (globalGuestList.length === 0) {
                const emptyHTML = `<div class="p-8 text-center text-amber-600/60 font-medium italic text-sm">Antrean kosong. Database cloud bersih ✨</div>`;
                tbodyDesktop.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-amber-600/60 font-medium italic">Antrean kosong.</td></tr>`;
                containerMobile.innerHTML = emptyHTML;
                countStandby.innerText = 0; countSent.innerText = 0;
                return;
            }

            globalGuestList.forEach((guest, index) => {
                if(guest.sent) { sent++; } else { standby++; }

                // Desktop Layout
                const tr = document.createElement('tr');
                tr.className = guest.sent ? "bg-emerald-50/30" : "hover:bg-amber-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-center font-medium ${guest.sent ? 'text-emerald-400' : 'text-amber-700/50'}">${index + 1}</td>
                    <td class="px-6 py-4 font-semibold ${guest.sent ? 'text-emerald-700/50 line-through' : 'text-gray-800'}">${guest.name}</td>
                    <td class="px-6 py-4 font-mono text-xs ${guest.sent ? 'text-emerald-600/50 line-through' : 'text-gray-600'}">+${guest.phone}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="toggleStatus(${index})" class="inline-block px-3 py-1 text-[11px] font-bold rounded-full border cursor-pointer transition transform active:scale-95 whitespace-nowrap ${guest.sent ? 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200 hover:bg-amber-200'}">
                            ${guest.sent ? 'Terkirim ✓' : 'Standby'}
                        </button>
                    </td>
                    <td class="px-6 py-4 flex items-center justify-center gap-2">
                        <button onclick="sendIndividual(${index})" class="px-4 py-2 text-xs font-bold rounded-lg shadow-sm text-white ${guest.sent ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-amber-500 hover:bg-amber-600'} transition transform active:scale-95">
                            Kirim Sekarang
                        </button>
                        <button onclick="deleteIndividual(${index})" class="px-3 py-2 text-xs font-bold rounded-lg shadow-sm bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 transition transform active:scale-95" title="Hapus">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z"/></svg>
                        </button>
                    </td>
                `;
                tbodyDesktop.appendChild(tr);

                // Mobile Layout
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border transition-all ${guest.sent ? 'bg-emerald-50/60 border-emerald-100' : 'bg-white border-amber-100/70 shadow-sm'} space-y-3`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-bold text-amber-600/70 uppercase tracking-wider block">Tamu #${index + 1}</span>
                            <h4 class="font-bold text-gray-800 text-sm mt-0.5 ${guest.sent ? 'line-through text-emerald-800/50' : ''}">${guest.name}</h4>
                            <p class="font-mono text-xs text-gray-500 mt-0.5 ${guest.sent ? 'line-through text-emerald-600/40' : ''}">+${guest.phone}</p>
                        </div>
                        <button onclick="toggleStatus(${index})" class="px-3 py-1 text-[11px] font-bold rounded-full border transition transform active:scale-95 ${guest.sent ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200'}">
                            ${guest.sent ? 'Terkirim ✓' : 'Standby'}
                        </button>
                    </div>
                    <div class="flex gap-2 pt-1 border-t border-dashed ${guest.sent ? 'border-emerald-200/50' : 'border-amber-100'}">
                        <button onclick="sendIndividual(${index})" class="flex-1 py-2.5 text-xs font-bold rounded-xl text-white ${guest.sent ? 'bg-emerald-500' : 'bg-amber-500'} flex items-center justify-center gap-1 transition transform active:scale-95">
                            Kirim Sekarang
                        </button>
                        <button onclick="deleteIndividual(${index})" class="px-4 py-2.5 text-xs font-bold rounded-xl bg-red-50 text-red-600 border border-red-100 flex items-center justify-center transition transform active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z"/></svg>
                        </button>
                    </div>
                `;
                containerMobile.appendChild(card);
            });
        }
    </script>
</body>
</html>
